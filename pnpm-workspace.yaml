packages:
  - "packages/*"
  - "site"

overrides:
  unrun: 0.2.37
  yaml: ^2.8.3
  eslint-plugin-functype: "workspace:*"
  eslint-config-functype: "workspace:*"

publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
  - "*vitest*"
  - "typescript"

minimumReleaseAge: 0

allowBuilds:
  esbuild: true
  sharp: true
  tldjs: true
