name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm turbo run validate

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `version-packages` runs `changeset version` followed by the
          # functype-mcp-server sync:registry script so server.json's
          # version + identifier track package.json. Without this wrapper
          # the MCP registry manifest would drift on every release.
          #
          # `check-publish-safety` runs before `pnpm publish` and refuses
          # major version bumps or downgrades unless explicitly authorized
          # via ALLOW_MAJOR env var. Added after the 0.60.7 → 1.0.0
          # cascade caused by a `workspace:^` peerDependency. See
          # docs/RELEASE.md "Independent cadence" for the post-mortem.
          version: pnpm run version-packages
          publish: pnpm check-publish-safety && pnpm -r publish --no-git-checks
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # One-time authorization for the family-cadence reset to 1.0.1.
          # functype and functype-mcp-server intentionally cross 0.x → 1.0
          # to align with functype-os/-log/-react (already on 1.x after
          # the accidental cascade). REMOVE THIS LINE in the follow-up PR
          # after the 1.0.1 release lands; future major bumps must be
          # re-authorized explicitly per release.
          ALLOW_MAJOR: functype,functype-mcp-server
