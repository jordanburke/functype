name: Publish

# Tag-triggered release. Run `pnpm release patch|minor|major` locally to
# bump versions, sync mirror, sync server.json, commit, and create the tag.
# `git push --follow-tags` triggers this workflow.
#
# The workflow re-validates everything (independent of local validate), runs
# `check-publish-safety` as the final gate (5 invariants — see header of
# scripts/check-publish-safety.ts), then `pnpm -r publish` walks the workspace
# and publishes any package whose local version differs from npm `latest`.
#
# OIDC trusted publishing for functype, functype-os, functype-log, functype-react
# (provenance attestations). functype-mcp-server publishes with NPM_TOKEN.
# Eslint packages publish with NPM_TOKEN.

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write # for GitHub releases
      id-token: write # for npm OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm turbo run validate

      - name: Check publish safety
        run: pnpm check-publish-safety
        env:
          # Major bumps require explicit per-release authorization.
          # When you intentionally do a major, push the tag with the
          # ALLOW_MAJOR env set on the workflow run (workflow_dispatch
          # in the Actions UI lets you override env vars), OR add it
          # here temporarily in a release-prep PR and remove afterwards.
          ALLOW_MAJOR: ""

      - name: Publish to npm
        run: pnpm -r publish --no-git-checks --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
